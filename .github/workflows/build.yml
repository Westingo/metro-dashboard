name: Build Metro Dashboard

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-doorking:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Configure for Doorking channel
        run: node scripts/configure.js doorking

      - name: Build and publish Doorking installer
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-wisenet:
    runs-on: windows-latest
    needs: build-doorking
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Configure for Wisenet channel
        run: node scripts/configure.js wisenet

      - name: Build and publish Wisenet installer
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-doorking-wisenet:
    runs-on: windows-latest
    needs: build-wisenet
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Configure for Doorking + Wisenet channel
        run: node scripts/configure.js doorking-wisenet

      - name: Build and publish Doorking + Wisenet installer
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-brivo:
    runs-on: windows-latest
    needs: build-doorking-wisenet
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Configure for Brivo channel
        run: node scripts/configure.js brivo

      - name: Build and publish Brivo installer
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-brivo-wisenet:
    runs-on: windows-latest
    needs: build-brivo
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Configure for Brivo + Wisenet channel
        run: node scripts/configure.js brivo-wisenet

      - name: Build and publish Brivo + Wisenet installer
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
