<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manuals Library</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .manuals-page {
      max-width: 700px;
      margin: 0 auto;
      padding: 32px 24px 64px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .manual-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-left: 4px solid var(--color-accent);
      border-radius: var(--radius);
      padding: 20px 24px;
      box-shadow: var(--shadow);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: border-color 0.2s, transform 0.15s;
    }

    .manual-card:hover {
      border-left-color: var(--color-accent-light);
      transform: translateX(4px);
    }

    .manual-icon {
      font-size: 1.6rem;
      flex-shrink: 0;
    }

    .manual-name {
      font-size: 1rem;
      font-weight: 600;
      color: var(--color-text);
    }

    .manual-hint {
      font-size: 0.8rem;
      color: var(--color-text-muted);
      margin-top: 2px;
    }

    .empty-state {
      color: var(--color-text-muted);
      font-size: 0.95rem;
      text-align: center;
      padding: 48px 0;
    }

    .back-btn {
      background: none;
      border: 1px solid var(--color-border);
      color: var(--color-accent-light);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-family: var(--font);
      width: fit-content;
    }

    .back-btn:hover {
      background: var(--color-surface);
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="header-brand">
      <span class="brand-name">Metro Access Control</span>
      <span class="brand-divider">|</span>
      <span class="brand-product">Manuals Library</span>
    </div>
  </header>

  <div class="manuals-page">
    <button onclick="window.location.href='index.html'" class="back-btn">← Back to Dashboard</button>
    <h2 class="section-title">Equipment Manuals</h2>
    <div id="manuals-list"></div>
  </div>

  <script>
    async function loadManuals() {
      const list = document.getElementById('manuals-list')

      if (!window.electronAPI) {
        list.innerHTML = '<div class="empty-state">Manuals are only available in the desktop app.</div>'
        return
      }

      const files = await window.electronAPI.listManuals()

      if (!files || files.length === 0) {
        list.innerHTML = '<div class="empty-state">No manuals or videos found.</div>'
        return
      }

      const videoExts = ['.mp4', '.mov', '.avi', '.mkv', '.webm']

      list.innerHTML = files.map(filename => {
        const ext = filename.substring(filename.lastIndexOf('.')).toLowerCase()
        const isVideo = videoExts.includes(ext)
        const icon = isVideo ? '🎬' : '📄'
        const hint = isVideo ? 'Click to play video' : 'Click to open PDF'
        const displayName = filename.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ')
        return `
          <div class="manual-card" onclick="openManual('${filename.replace(/'/g, "\\'")}')">
            <div class="manual-icon">${icon}</div>
            <div>
              <div class="manual-name">${displayName}</div>
              <div class="manual-hint">${hint}</div>
            </div>
          </div>`
      }).join('')
    }

    function openManual(filename) {
      window.electronAPI.openPdf(filename)
    }

    loadManuals()
  </script>

</body>
</html>
